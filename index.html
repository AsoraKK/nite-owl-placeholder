<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nite Owl Angling Supplies</title>
  <meta name="description" content="Nite Owl Angling Supplies placeholder page." />
  <style>
    :root{
      --bg-0:#06142b;
      --bg-1:#0a1f3f;
      --ink:#f0f5ff;
      --muted:#b2c3dd;
      --line:rgba(210,226,249,.26);
      --line-soft:rgba(210,226,249,.12);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      color:var(--ink);
      background:
        radial-gradient(circle at 16% 8%, rgba(255,255,255,.05), transparent 24%),
        linear-gradient(180deg, var(--bg-0), var(--bg-1));
      font-family:"Avenir Next","Segoe UI","Helvetica Neue",Arial,sans-serif;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    .page{
      min-height:100vh;
      display:grid;
      grid-template-rows:minmax(0, 3fr) minmax(132px, 1fr);
    }

    .hero{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:clamp(36px, 7vw, 88px) 24px;
      text-align:center;
    }

    .hero-copy{
      width:min(760px, 100%);
    }

    .brand{
      margin:0;
      color:var(--muted);
      font-size:clamp(.88rem, .8rem + .24vw, 1rem);
      letter-spacing:.16em;
      text-transform:uppercase;
      font-weight:600;
    }

    .headline{
      margin:22px 0 0;
      font-family:"Iowan Old Style","Palatino Linotype","Book Antiqua",Georgia,serif;
      font-size:clamp(2rem, 1.3rem + 2.2vw, 3.8rem);
      line-height:1.06;
      letter-spacing:-.015em;
      max-width:18ch;
      margin-left:auto;
      margin-right:auto;
      text-wrap:balance;
      font-weight:600;
    }

    .subline{
      margin:18px auto 0;
      max-width:36ch;
      font-size:clamp(.95rem, .88rem + .22vw, 1.12rem);
      line-height:1.55;
      color:var(--muted);
      text-wrap:balance;
    }

    .runner{
      position:relative;
      border-top:1px solid var(--line-soft);
      background:linear-gradient(180deg, rgba(4,12,24,.42), rgba(4,10,20,.6));
      overflow:hidden;
      padding:0 14px;
    }

    .pond{
      position:relative;
      width:min(980px, 100%);
      height:100%;
      min-height:132px;
    }

    .pond-canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      display:block;
    }

    .game-hud{
      position:absolute;
      left:12px;
      right:12px;
      top:9px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      font:600 12px/1.2 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color:var(--muted);
      letter-spacing:.06em;
      text-transform:uppercase;
      pointer-events:none;
      user-select:none;
      z-index:2;
    }

    .game-hud span{
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .hint{
      position:absolute;
      right:12px;
      bottom:8px;
      margin:0;
      font:600 10px/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      text-transform:uppercase;
      letter-spacing:.09em;
      color:var(--muted);
      opacity:.68;
      pointer-events:none;
      user-select:none;
      z-index:2;
    }

    @media (max-width: 760px){
      .page{
        grid-template-rows:minmax(0, 3fr) minmax(116px, 1fr);
      }
      .hero{
        padding:32px 18px 40px;
      }
      .headline{
        margin-top:18px;
      }
      .subline{
        margin-top:15px;
      }
      .runner{
        padding:0 10px;
      }
      .game-hud{
        font-size:11px;
      }
      .hint{
        font-size:9px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-label="Nite Owl Angling Supplies placeholder">
      <div class="hero-copy">
        <p class="brand">Nite Owl Angling Supplies</p>
        <h1 class="headline">We hooked something big. Still landing it.</h1>
        <p class="subline">The full site is on the way.</p>
      </div>
    </section>

    <section class="runner" aria-label="Retro fishing mini game">
      <div class="pond" id="pond">
        <div class="game-hud" aria-hidden="true">
          <span id="catchText">Catch: None</span>
          <span id="bestText">Best: None</span>
        </div>
        <canvas class="pond-canvas" id="pondCanvas"></canvas>
        <p class="hint" id="hint">Press Space</p>
      </div>
    </section>
  </main>

  <script>
    (() => {
      const canvas = document.getElementById('pondCanvas');
      const pond = document.getElementById('pond');
      const catchText = document.getElementById('catchText');
      const bestText = document.getElementById('bestText');
      const hint = document.getElementById('hint');
      const ctx = canvas.getContext('2d');
      const STORE_KEY = 'niteowl_best_fish_v1';

      const state = {
        width: 0,
        height: 0,
        dpr: 1,
        time: 0,
        phase: 'waiting',
        tug: 0.02,
        castClock: 0,
        rise: 2.4,
        peak: 0.55,
        fade: 0.9,
        target: 0.85,
        resultTimer: 0,
        resultText: '',
        hintSeen: false,
        best: { name: 'None', kg: 0 },
        current: { name: 'None', kg: 0 }
      };

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function rand(min, max) {
        return min + Math.random() * (max - min);
      }

      function easeOutCubic(t) {
        return 1 - Math.pow(1 - t, 3);
      }

      function readBestFish() {
        try {
          const raw = localStorage.getItem(STORE_KEY);
          if (!raw) return { name: 'None', kg: 0 };
          const parsed = JSON.parse(raw);
          if (typeof parsed?.name === 'string' && typeof parsed?.kg === 'number') {
            return { name: parsed.name, kg: parsed.kg };
          }
        } catch {
          return { name: 'None', kg: 0 };
        }
        return { name: 'None', kg: 0 };
      }

      function writeBestFish(best) {
        try {
          localStorage.setItem(STORE_KEY, JSON.stringify(best));
        } catch {
          void 0;
        }
      }

      function fishFromTug(tug) {
        const tiers = [
          { min: 0.38, max: 0.50, name: 'Small Fry', lo: 0.4, hi: 0.9 },
          { min: 0.50, max: 0.63, name: 'River Bream', lo: 1.0, hi: 2.0 },
          { min: 0.63, max: 0.75, name: 'Silver Bass', lo: 2.1, hi: 3.9 },
          { min: 0.75, max: 0.86, name: 'Big Carp', lo: 4.0, hi: 6.4 },
          { min: 0.86, max: 0.94, name: 'Kingfish', lo: 6.5, hi: 9.4 },
          { min: 0.94, max: 1.01, name: 'Trophy Marlin', lo: 9.5, hi: 13.0 }
        ];

        for (const tier of tiers) {
          if (tug >= tier.min && tug < tier.max) {
            const span = clamp((tug - tier.min) / (tier.max - tier.min), 0, 1);
            const wobble = rand(-0.08, 0.08);
            const kg = clamp(lerp(tier.lo, tier.hi, span + wobble), tier.lo, tier.hi);
            return { name: tier.name, kg: Number(kg.toFixed(1)) };
          }
        }
        return null;
      }

      function nextCast() {
        state.phase = 'waiting';
        state.castClock = 0;
        state.rise = rand(1.7, 3.2);
        state.peak = rand(0.36, 0.68);
        state.fade = rand(0.72, 1.08);
        state.target = rand(0.56, 0.98);
      }

      function setHud() {
        if (state.current.kg > 0) {
          catchText.textContent = `Catch: ${state.current.name} ${state.current.kg.toFixed(1)}kg`;
        } else {
          catchText.textContent = `Catch: ${state.current.name}`;
        }

        if (state.best.kg > 0) {
          bestText.textContent = `Best: ${state.best.name} ${state.best.kg.toFixed(1)}kg`;
        } else {
          bestText.textContent = 'Best: None';
        }
      }

      function attemptHook() {
        if (state.phase !== 'waiting') return;

        hint.style.opacity = '0.38';
        state.hintSeen = true;

        const fish = fishFromTug(state.tug);
        if (!fish) {
          state.current = { name: state.tug > 0.22 ? 'Nibble Missed' : 'Too Early', kg: 0 };
          state.resultText = state.tug > 0.22 ? 'Line slipped' : 'No tug';
        } else {
          state.current = fish;
          state.resultText = 'Landed';
          if (fish.kg > state.best.kg) {
            state.best = fish;
            writeBestFish(fish);
          }
        }

        setHud();
        state.phase = 'result';
        state.resultTimer = 0.95;
      }

      function resize() {
        const rect = pond.getBoundingClientRect();
        state.width = Math.max(1, rect.width);
        state.height = Math.max(1, rect.height);
        state.dpr = Math.min(2, window.devicePixelRatio || 1);
        canvas.width = Math.round(state.width * state.dpr);
        canvas.height = Math.round(state.height * state.dpr);
        canvas.style.width = `${state.width}px`;
        canvas.style.height = `${state.height}px`;
        ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
        ctx.imageSmoothingEnabled = false;
      }

      function drawFishShape(x, y, scale, alpha) {
        ctx.save();
        ctx.translate(x, y);
        ctx.scale(scale, scale);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = 'rgba(232,242,255,.28)';
        ctx.fillRect(0, 0, 12, 5);
        ctx.beginPath();
        ctx.moveTo(-4, 2.5);
        ctx.lineTo(0, 0);
        ctx.lineTo(0, 5);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      function drawScene() {
        const w = state.width;
        const h = state.height;
        const surfaceY = Math.round(h * 0.48);
        const dockY = surfaceY - 6;

        ctx.clearRect(0, 0, w, h);

        ctx.strokeStyle = 'rgba(220,232,250,.28)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(0, surfaceY);
        ctx.lineTo(w, surfaceY);
        ctx.stroke();

        for (let i = 0; i < 4; i++) {
          const waveY = surfaceY + 7 + i * 7;
          const shift = (state.time * (18 + i * 5)) % 26;
          ctx.strokeStyle = `rgba(210,226,249,${0.07 - i * 0.012})`;
          ctx.beginPath();
          for (let x = -30; x < w + 30; x += 26) {
            ctx.moveTo(x + shift, waveY);
            ctx.lineTo(x + shift + 12, waveY);
          }
          ctx.stroke();
        }

        ctx.fillStyle = 'rgba(220,232,250,.14)';
        ctx.fillRect(0, dockY, Math.min(120, w * 0.24), 3);

        const fisherX = 26;
        const fisherY = dockY - 2;
        ctx.fillStyle = 'rgba(242,248,255,.9)';
        ctx.fillRect(fisherX, fisherY - 20, 5, 5);
        ctx.fillRect(fisherX + 1, fisherY - 15, 3, 7);
        ctx.fillRect(fisherX + 4, fisherY - 12, 6, 2);
        ctx.fillRect(fisherX + 1, fisherY - 8, 2, 5);
        ctx.fillRect(fisherX + 3, fisherY - 8, 2, 5);

        const rodBaseX = fisherX + 8;
        const rodBaseY = fisherY - 12;
        const rodTipX = fisherX + 34;
        const rodTipY = fisherY - 24;
        ctx.strokeStyle = 'rgba(234,244,255,.9)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(rodBaseX, rodBaseY);
        ctx.lineTo(rodTipX, rodTipY);
        ctx.stroke();

        const bobberX = clamp(w * 0.62 + Math.sin(state.time * 0.9) * 4, 116, w - 18);
        const bitePulse = state.phase === 'waiting' ? Math.sin(state.time * 20) * 0.5 + 0.5 : 0;
        const tugDepth = state.tug * 20 + bitePulse * state.tug * 3;
        const bobberY = surfaceY + 5 + tugDepth + Math.sin(state.time * 6.5) * (0.5 + state.tug * 1.5);
        const lineSag = 16 - state.tug * 9;

        ctx.strokeStyle = 'rgba(235,246,255,.8)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(rodTipX, rodTipY);
        ctx.quadraticCurveTo((rodTipX + bobberX) * 0.5, rodTipY + lineSag, bobberX, bobberY);
        ctx.stroke();

        ctx.fillStyle = 'rgba(240,248,255,.94)';
        ctx.fillRect(Math.round(bobberX - 1), Math.round(bobberY - 3), 3, 6);
        ctx.fillRect(Math.round(bobberX - 2), Math.round(bobberY + 1), 5, 2);

        if (state.tug > 0.58 && state.phase === 'waiting') {
          const fishX = bobberX + 13 + Math.sin(state.time * 11) * 5;
          const fishY = bobberY + 11 + Math.cos(state.time * 9) * 2;
          drawFishShape(fishX, fishY, 1 + state.tug * 0.2, 0.35 + state.tug * 0.3);
        }

        const gaugeLeft = Math.max(124, w * 0.34);
        const gaugeRight = w - 20;
        const gaugeY = 30;
        ctx.strokeStyle = 'rgba(214,228,248,.22)';
        ctx.beginPath();
        ctx.moveTo(gaugeLeft, gaugeY);
        ctx.lineTo(gaugeRight, gaugeY);
        ctx.stroke();

        const markerX = lerp(gaugeLeft, gaugeRight, clamp(state.tug, 0, 1));
        ctx.fillStyle = 'rgba(240,248,255,.86)';
        ctx.beginPath();
        ctx.moveTo(markerX, gaugeY - 5);
        ctx.lineTo(markerX - 4, gaugeY - 11);
        ctx.lineTo(markerX + 4, gaugeY - 11);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = 'rgba(185,203,228,.72)';
        ctx.font = '600 9px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace';
        ctx.textBaseline = 'top';
        ctx.fillText('Fry', gaugeLeft, gaugeY + 4);
        ctx.fillText('Bream', lerp(gaugeLeft, gaugeRight, 0.33), gaugeY + 4);
        ctx.fillText('Bass', lerp(gaugeLeft, gaugeRight, 0.58), gaugeY + 4);
        ctx.fillText('Trophy', gaugeRight - 30, gaugeY + 4);

        if (state.phase === 'result' && state.resultText) {
          ctx.fillStyle = 'rgba(230,241,255,.86)';
          ctx.font = '600 11px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(state.resultText, w * 0.5, h - 14);
          ctx.textAlign = 'start';
        }
      }

      function update(dt) {
        state.time += dt;

        if (state.phase === 'waiting') {
          state.castClock += dt;
          const t = state.castClock;

          if (t < state.rise) {
            const p = clamp(t / state.rise, 0, 1);
            state.tug = easeOutCubic(p) * state.target;
          } else if (t < state.rise + state.peak) {
            const p = (t - state.rise) / state.peak;
            state.tug = clamp(state.target + Math.sin(p * Math.PI * 3.2) * 0.08 + 0.1, 0, 1);
          } else if (t < state.rise + state.peak + state.fade) {
            const p = (t - state.rise - state.peak) / state.fade;
            state.tug = lerp(state.target * 0.75, 0.02, p);
          } else {
            state.current = { name: 'Fish Got Away', kg: 0 };
            state.resultText = 'Too late';
            setHud();
            state.phase = 'result';
            state.resultTimer = 0.8;
          }
        } else {
          state.resultTimer -= dt;
          state.tug = Math.max(0.02, state.tug - dt * 1.3);
          if (state.resultTimer <= 0) {
            nextCast();
          }
        }
      }

      function frame(ts) {
        if (!frame.last) frame.last = ts;
        const dt = Math.min((ts - frame.last) / 1000, 0.033);
        frame.last = ts;
        update(dt);
        drawScene();
        requestAnimationFrame(frame);
      }

      function onAction() {
        attemptHook();
      }

      window.addEventListener('resize', resize);
      window.addEventListener('keydown', (event) => {
        if (event.code === 'Space') {
          event.preventDefault();
          onAction();
        }
      });
      pond.addEventListener('pointerdown', (event) => {
        event.preventDefault();
        onAction();
      });

      state.best = readBestFish();
      setHud();
      nextCast();
      resize();
      requestAnimationFrame(frame);
    })();
  </script>
</body>
</html>
