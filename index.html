<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nite Owl Angling Supplies</title>
  <meta name="description" content="Nite Owl Angling Supplies placeholder page." />
  <style>
    :root{
      --bg-0:#06142b;
      --bg-1:#0a1f3f;
      --ink:#f0f5ff;
      --muted:#b2c3dd;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      color:var(--ink);
      background:
        radial-gradient(circle at 16% 8%, rgba(255,255,255,.05), transparent 24%),
        linear-gradient(180deg, var(--bg-0), var(--bg-1));
      font-family:"Avenir Next","Segoe UI","Helvetica Neue",Arial,sans-serif;
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }

    .page{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:clamp(36px, 7vw, 88px) 24px;
    }

    .hero{
      text-align:center;
      width:min(760px, 100%);
    }

    .hero-copy{
      width:100%;
    }

    .brand{
      margin:0;
      color:var(--muted);
      font-size:clamp(.88rem, .8rem + .24vw, 1rem);
      letter-spacing:.16em;
      text-transform:uppercase;
      font-weight:600;
    }

    .headline{
      margin:22px 0 0;
      font-family:"Iowan Old Style","Palatino Linotype","Book Antiqua",Georgia,serif;
      font-size:clamp(2rem, 1.3rem + 2.2vw, 3.8rem);
      line-height:1.06;
      letter-spacing:-.015em;
      max-width:18ch;
      margin-left:auto;
      margin-right:auto;
      text-wrap:balance;
      font-weight:600;
    }

    .subline{
      margin:18px auto 0;
      max-width:36ch;
      font-size:clamp(.95rem, .88rem + .22vw, 1.12rem);
      line-height:1.55;
      color:var(--muted);
      text-wrap:balance;
    }

    @media (max-width: 760px){
      .page{padding:32px 18px 40px;}
      .headline{
        margin-top:18px;
      }
      .subline{
        margin-top:15px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-label="Nite Owl Angling Supplies placeholder">
      <div class="hero-copy">
        <p class="brand">Nite Owl Angling Supplies</p>
        <h1 class="headline">We hooked something big. Still landing it.</h1>
        <p class="subline">The full site is on the way.</p>
      </div>
    </section>
  </main>
</body>
</html>
