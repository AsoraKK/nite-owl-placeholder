<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nite Owl Angling Supplies</title>
  <meta name="description" content="Nite Owl Angling Supplies placeholder page." />
  <style>
    :root{
      --bg0:#06142b;
      --bg1:#0a1f3f;
      --panel:rgba(255,255,255,.04);
      --line:rgba(210,228,255,.16);
      --text:#f4f8ff;
      --muted:#a8bdd8;
      --soft:#d8e6fb;
      --fish:#ffffff;
      --accent:#dce9ff;
      --shadow:0 20px 50px rgba(0,0,0,.22);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      color:var(--text);
      background:
        radial-gradient(circle at 12% 12%, rgba(255,255,255,.07), transparent 24%),
        radial-gradient(circle at 82% 6%, rgba(255,255,255,.05), transparent 16%),
        linear-gradient(180deg,var(--bg0),var(--bg1));
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .page{
      min-height:100vh;
      display:grid;
      grid-template-rows: 3fr 1fr;
    }

    .hero{
      display:flex;
      align-items:center;
      justify-content:center;
      padding:clamp(28px, 5vw, 68px);
      text-align:center;
      position:relative;
      overflow:hidden;
    }

    .hero::after{
      content:"";
      position:absolute;
      inset:0;
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), transparent 30%),
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.04), transparent 25%);
      pointer-events:none;
    }

    .hero-inner{
      position:relative;
      z-index:1;
      max-width:980px;
    }

    .eyebrow{
      margin:0 0 18px;
      font-size:.78rem;
      line-height:1;
      letter-spacing:.24em;
      text-transform:uppercase;
      color:var(--muted);
    }

    h1{
      margin:0;
      font-size:clamp(2.5rem, 6vw, 5.5rem);
      line-height:.94;
      letter-spacing:-.06em;
      font-weight:800;
      text-wrap:balance;
    }

    .line-2{
      margin:18px 0 0;
      font-size:clamp(1.1rem, 1.4vw, 1.45rem);
      line-height:1.5;
      color:var(--soft);
      text-wrap:balance;
    }

    .subtext{
      margin:14px 0 0;
      font-size:.95rem;
      line-height:1.5;
      color:var(--muted);
    }

    .runner{
      position:relative;
      border-top:1px solid rgba(255,255,255,.08);
      background:
        linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015)),
        rgba(0,0,0,.08);
      overflow:hidden;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
    }

    .hud{
      position:absolute;
      inset:0 0 auto 0;
      padding:16px 18px 0;
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      pointer-events:none;
      z-index:5;
      font:700 13px/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      letter-spacing:.04em;
      color:var(--muted);
      user-select:none;
    }

    .hud .score{
      display:flex;
      gap:14px;
      flex-wrap:wrap;
    }

    .hud .hint{
      color:rgba(216,230,251,.78);
      opacity:.8;
    }

    .stage{
      position:absolute;
      inset:0;
      overflow:hidden;
      touch-action:manipulation;
    }

    .game-canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      z-index:2;
    }

    .surface,
    .ground{
      position:absolute;
      left:0;
      right:0;
      height:1px;
      background:var(--line);
      z-index:1;
    }

    .surface{ top:14px; opacity:.85; }
    .ground{ bottom:18px; opacity:.9; }

    .surface::before{
      content:"";
      position:absolute;
      left:0;
      right:0;
      top:-7px;
      height:7px;
      background:linear-gradient(180deg, rgba(255,255,255,.08), transparent);
    }

    .fish,
    .obstacle,
    .overlay{
      position:absolute;
      left:0;
      top:0;
      will-change:transform;
    }

    .fish{
      width:54px;
      height:28px;
      z-index:3;
      filter:drop-shadow(0 8px 14px rgba(0,0,0,.18));
    }

    .fish .tail{
      position:absolute;
      left:0;
      top:8px;
      width:16px;
      height:12px;
      background:var(--fish);
      clip-path:polygon(100% 50%, 0 0, 0 100%);
      transform-origin:right center;
      animation:tail 180ms ease-in-out infinite alternate;
    }

    .fish .body{
      position:absolute;
      left:11px;
      top:6px;
      width:30px;
      height:16px;
      border-radius:999px;
      background:var(--fish);
    }

    .fish .fin{
      position:absolute;
      left:21px;
      top:2px;
      width:10px;
      height:8px;
      background:var(--fish);
      clip-path:polygon(0 100%, 50% 0, 100% 100%);
    }

    .fish .eye{
      position:absolute;
      left:36px;
      top:12px;
      width:4px;
      height:4px;
      border-radius:50%;
      background:#0a1f3f;
    }

    @keyframes tail{
      from{transform:rotate(-10deg)}
      to{transform:rotate(12deg)}
    }

    .obstacle{
      z-index:2;
      filter:drop-shadow(0 8px 12px rgba(0,0,0,.16));
    }

    .hook{
      width:26px;
      height:44px;
    }

    .hook .shank{
      position:absolute;
      left:11px;
      top:0;
      width:2px;
      height:28px;
      background:rgba(220,233,255,.44);
    }

    .hook .curve{
      position:absolute;
      left:5px;
      top:18px;
      width:14px;
      height:18px;
      border-right:3px solid var(--accent);
      border-bottom:3px solid var(--accent);
      border-radius:0 0 10px 0;
    }

    .hook .tip{
      position:absolute;
      left:16px;
      top:30px;
      width:8px;
      height:3px;
      background:var(--accent);
      border-radius:999px;
      transform:rotate(18deg);
    }

    .net{
      width:50px;
      height:52px;
    }

    .net .rope{
      position:absolute;
      left:24px;
      top:-30px;
      width:2px;
      height:34px;
      background:rgba(220,233,255,.34);
    }

    .net .frame{
      position:absolute;
      inset:0;
      border:2px solid var(--accent);
      border-radius:11px;
      background:
        linear-gradient(90deg, transparent 28%, rgba(220,233,255,.14) 28%, rgba(220,233,255,.14) 32%, transparent 32%, transparent 50%, rgba(220,233,255,.14) 50%, rgba(220,233,255,.14) 54%, transparent 54%, transparent 72%, rgba(220,233,255,.14) 72%, rgba(220,233,255,.14) 76%, transparent 76%),
        linear-gradient(180deg, transparent 28%, rgba(220,233,255,.14) 28%, rgba(220,233,255,.14) 32%, transparent 32%, transparent 50%, rgba(220,233,255,.14) 50%, rgba(220,233,255,.14) 54%, transparent 54%, transparent 72%, rgba(220,233,255,.14) 72%, rgba(220,233,255,.14) 76%, transparent 76%);
      opacity:.95;
    }

    .overlay{
      left:50%;
      top:50%;
      z-index:6;
      transform:translate(-50%, -50%);
      text-align:center;
      pointer-events:none;
      opacity:0;
      transition:opacity .12s ease;
    }

    .overlay.is-visible{
      opacity:1;
    }

    .overlay .title{
      font:800 clamp(.98rem, 1.1vw, 1.15rem)/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color:var(--soft);
      letter-spacing:.12em;
      text-transform:uppercase;
    }

    .overlay .sub{
      margin-top:10px;
      font:700 11px/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      color:rgba(216,230,251,.72);
      letter-spacing:.14em;
      text-transform:uppercase;
    }

    .flash{
      position:absolute;
      inset:0;
      background:rgba(255,255,255,.1);
      opacity:0;
      pointer-events:none;
      z-index:4;
    }

    .flash.is-on{
      animation:flash .16s ease-out 1;
    }

    @keyframes flash{
      from{opacity:.32}
      to{opacity:0}
    }

    @media (max-width: 720px){
      .page{grid-template-rows: 2.55fr 1fr;}
      .hero{padding:24px 18px;}
      .eyebrow{margin-bottom:14px;}
      .line-2{margin-top:16px;}
      .hud{padding:12px 12px 0; font-size:12px;}
      .surface{top:12px;}
      .ground{bottom:16px;}
      .fish{width:50px;height:26px;}
    }

    @media (prefers-reduced-motion: reduce){
      .fish .tail,
      .flash.is-on{
        animation:none;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="hero" aria-label="Nite Owl Angling Supplies placeholder">
      <div class="hero-inner">
        <p class="eyebrow">Nite Owl Angling Supplies</p>
        <h1>Nite Owl Angling Supplies.</h1>
        <p class="line-2">We hooked something big. Still landing it.</p>
        <p class="subtext">We&apos;re building the full site.</p>
      </div>
    </section>

    <section class="runner" aria-label="Minimal fish runner game">
      <div class="hud" aria-hidden="true">
        <div class="score">
          <span id="distance">0m</span>
          <span id="best">Best 0m</span>
        </div>
        <div class="hint">Press Space</div>
      </div>

      <div class="stage" id="stage" tabindex="0" aria-label="Play area">
        <div class="surface"></div>
        <canvas class="game-canvas" id="gameCanvas"></canvas>
        <div class="ground"></div>
        <div class="flash" id="flash"></div>
        <div class="overlay" id="overlay" aria-live="polite">
          <div class="title" id="overlayTitle">Press Space</div>
          <div class="sub">Press Space</div>
        </div>
      </div>
    </section>
  </main>

  <script>
    (() => {
      const stage = document.getElementById('stage');
      const canvas = document.getElementById('gameCanvas');
      const ctx = canvas.getContext('2d');
      const distanceEl = document.getElementById('distance');
      const bestEl = document.getElementById('best');
      const overlay = document.getElementById('overlay');
      const overlayTitle = document.getElementById('overlayTitle');
      const flash = document.getElementById('flash');

      const STORE_KEY = 'nite_owl_best_m';
      const FISH_X = 92;
      const FISH_W = 34;
      const FISH_H = 18;
      const GROUND_GAP = 18;
      const SURFACE_GAP = 14;
      const GRAVITY = 1680;
      const JUMP_VELOCITY = -580;
      const SPEED_START = 220;
      const SPEED_MAX = 440;
      const SPEED_RAMP = 7.5;
      const SPAWN_MIN = 0.85;
      const SPAWN_MAX = 1.45;
      const BAIT_MIN = 0.62;
      const BAIT_MAX = 1.08;

      const state = {
        running: false,
        gameOver: false,
        width: 0,
        height: 0,
        groundY: 0,
        surfaceY: 0,
        fishY: 0,
        fishVY: 0,
        speed: SPEED_START,
        distance: 0,
        best: readBest(),
        spawnIn: 0.9,
        baitIn: 0.75,
        obstacles: [],
        baits: [],
        stars: [],
        shake: 0,
        flash: 0,
        lastTime: 0
      };

      function readBest(){
        try {
          return Number(localStorage.getItem(STORE_KEY) || 0);
        } catch {
          return 0;
        }
      }

      function writeBest(value){
        try {
          localStorage.setItem(STORE_KEY, String(value));
        } catch {
          void 0;
        }
      }

      function formatMeters(value){
        return `${Math.max(0, Math.floor(value))}m`;
      }

      function clamp(value, min, max){
        return Math.max(min, Math.min(max, value));
      }

      function rand(min, max){
        return min + Math.random() * (max - min);
      }

      function overlap(a, b){
        return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
      }

      function roundedRectPath(x, y, w, h, r){
        const radius = Math.min(r, w / 2, h / 2);
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.arcTo(x + w, y, x + w, y + h, radius);
        ctx.arcTo(x + w, y + h, x, y + h, radius);
        ctx.arcTo(x, y + h, x, y, radius);
        ctx.arcTo(x, y, x + w, y, radius);
        ctx.closePath();
      }

      function resize(){
        const rect = stage.getBoundingClientRect();
        const dpr = Math.min(2, window.devicePixelRatio || 1);
        state.width = rect.width;
        state.height = rect.height;
        state.groundY = state.height - GROUND_GAP;
        state.surfaceY = SURFACE_GAP;
        canvas.width = Math.max(1, Math.round(rect.width * dpr));
        canvas.height = Math.max(1, Math.round(rect.height * dpr));
        canvas.style.width = `${rect.width}px`;
        canvas.style.height = `${rect.height}px`;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        ctx.imageSmoothingEnabled = false;
        initStars();

        if (!state.running && !state.gameOver) {
          state.fishY = state.groundY - FISH_H;
        }
      }

      function initStars(){
        const count = Math.max(20, Math.round(state.width * state.height / 6000));
        state.stars = Array.from({ length: count }, () => ({
          x: Math.random() * state.width,
          y: Math.random() * Math.max(70, state.height * 0.72),
          r: Math.random() * 1.3 + 0.4,
          speed: rand(10, 24),
          phase: Math.random() * Math.PI * 2
        }));
      }

      function resetWorld(){
        state.spawnIn = 0.72;
        state.baitIn = 0.45;
        state.obstacles.length = 0;
        state.baits.length = 0;
        state.shake = 0;
        state.flash = 0;
      }

      function spawnObstacle(){
        const kind = Math.random() < 0.38 ? 'net' : 'hook';
        const h = kind === 'net' ? rand(54, 70) : rand(40, 50);
        const w = kind === 'net' ? rand(50, 62) : rand(24, 30);
        state.obstacles.push({
          kind,
          x: state.width + 44,
          y: state.groundY - h,
          w,
          h,
          wobble: Math.random() * Math.PI * 2
        });
      }

      function spawnBait(force){
        if (!force && Math.random() < 0.35) {
          return;
        }
        state.baits.push({
          x: state.width + 60,
          y: rand(state.surfaceY + 44, state.groundY - 88),
          r: 4,
          phase: Math.random() * Math.PI * 2
        });
      }

      function setOverlay(visible, title){
        overlay.classList.toggle('is-visible', visible);
        overlayTitle.textContent = title;
      }

      function reset(){
        state.running = true;
        state.gameOver = false;
        state.speed = SPEED_START;
        state.distance = 0;
        state.spawnIn = 0.78;
        state.baitIn = 0.52;
        state.fishVY = JUMP_VELOCITY;
        state.fishY = state.groundY - FISH_H;
        state.lastTime = 0;
        resetWorld();
        setOverlay(false, 'Press Space');
        distanceEl.textContent = formatMeters(0);
        bestEl.textContent = `Best ${formatMeters(state.best)}`;
      }

      function gameOver(reason){
        if (state.gameOver) return;
        state.running = false;
        state.gameOver = true;
        state.best = Math.max(state.best, Math.floor(state.distance));
        writeBest(state.best);
        bestEl.textContent = `Best ${formatMeters(state.best)}`;
        state.shake = 10;
        flash.classList.remove('is-on');
        void flash.offsetWidth;
        flash.classList.add('is-on');
        setOverlay(true, reason);
      }

      function jump(){
        if (!state.running || state.gameOver) {
          reset();
          return;
        }
        state.fishVY = JUMP_VELOCITY;
      }

      function updateFish(dt){
        state.fishVY += GRAVITY * dt;
        state.fishY += state.fishVY * dt;

        if (state.fishY + FISH_H >= state.groundY) {
          state.fishY = state.groundY - FISH_H;
          state.fishVY = 0;
        }

        if (state.fishY <= state.surfaceY) {
          state.fishY = state.surfaceY;
          gameOver('Owl attack');
          return;
        }
      }

      function updateObstacles(dt){
        state.spawnIn -= dt;
        if (state.spawnIn <= 0) {
          spawnObstacle();
          const t = Math.min(1, (state.speed - SPEED_START) / (SPEED_MAX - SPEED_START));
          state.spawnIn = SPAWN_MAX - t * 0.22 - Math.random() * 0.2;
          state.spawnIn = Math.max(SPAWN_MIN, state.spawnIn);
          state.baitIn = Math.max(BAIT_MIN, state.baitIn - 0.08);
        }

        state.baitIn -= dt;
        if (state.baitIn <= 0) {
          spawnBait(true);
          state.baitIn = rand(BAIT_MIN, BAIT_MAX);
        }

        for (let i = state.obstacles.length - 1; i >= 0; i--) {
          const obstacle = state.obstacles[i];
          obstacle.x -= state.speed * dt;
          obstacle.wobble += dt * 4;
          const obstacleRect = { x: obstacle.x, y: obstacle.y, w: obstacle.w, h: obstacle.h };
          const fishRect = { x: FISH_X + 5, y: state.fishY + 3, w: FISH_W - 12, h: FISH_H - 6 };
          const hit = overlap(fishRect, obstacleRect);

          if (hit) {
            gameOver('Caught');
            return;
          }

          if (obstacle.x + obstacle.w < -80) {
            obstacle.el.remove();
            state.obstacles.splice(i, 1);
          }
        }

        const fishRect = { x: FISH_X + 4, y: state.fishY + 2, w: FISH_W - 10, h: FISH_H - 4 };
        for (let i = state.baits.length - 1; i >= 0; i--) {
          const bait = state.baits[i];
          bait.x -= state.speed * dt;
          bait.phase += dt * 5;
          const baitRect = { x: bait.x - bait.r, y: bait.y - bait.r, w: bait.r * 2, h: bait.r * 2 };
          if (overlap(fishRect, baitRect)) {
            state.distance += 3;
            state.speed = Math.min(SPEED_MAX, state.speed + 10);
            state.flash = 0.05;
            state.baits.splice(i, 1);
            continue;
          }
          if (bait.x < -20) {
            state.baits.splice(i, 1);
          }
        }
      }

      function updateScore(dt){
        const bonus = state.speed / SPEED_START;
        state.distance += dt * (11.5 * bonus);
        const current = Math.floor(state.distance);
        distanceEl.textContent = formatMeters(current);
        bestEl.textContent = `Best ${formatMeters(Math.max(state.best, current))}`;
      }

      function drawBackground(time){
        const bg = ctx.createLinearGradient(0, 0, 0, state.height);
        bg.addColorStop(0, '#07142c');
        bg.addColorStop(1, '#0a1f3f');
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, state.width, state.height);

        ctx.fillStyle = 'rgba(255,255,255,.08)';
        ctx.beginPath();
        ctx.arc(state.width - 68, 52, 14, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255,255,255,.05)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(state.width - 68, 52, 20, 0, Math.PI * 2);
        ctx.stroke();

        for (const star of state.stars) {
          star.x -= star.speed * 0.012 * (0.8 + state.speed / SPEED_MAX);
          if (star.x < -4) star.x = state.width + 4;
          ctx.fillStyle = `rgba(255,255,255,${0.35 + Math.sin(time * 0.001 + star.phase) * 0.2})`;
          ctx.fillRect(star.x, star.y, star.r, star.r);
        }

        ctx.strokeStyle = 'rgba(216,230,251,.05)';
        ctx.lineWidth = 1;
        for (let y = 30; y < state.height - 24; y += 13) {
          ctx.beginPath();
          for (let x = -20; x <= state.width + 20; x += 18) {
            const wave = Math.sin((x * 0.06) + time * 0.0018 + y * 0.18) * 1.5;
            if (x === -20) {
              ctx.moveTo(x, y + wave);
            } else {
              ctx.lineTo(x, y + wave);
            }
          }
          ctx.stroke();
        }

        ctx.fillStyle = 'rgba(255,255,255,.03)';
        for (let i = 0; i < 8; i++) {
          const yy = 20 + i * 24;
          ctx.fillRect(0, yy, state.width, 1);
        }
      }

      function drawFish(time){
        const bob = Math.sin(time * 0.009) * 0.7;
        const x = FISH_X;
        const y = state.fishY + bob;
        ctx.save();
        ctx.translate(x, y);
        ctx.shadowColor = 'rgba(0,0,0,.2)';
        ctx.shadowBlur = 8;
        ctx.shadowOffsetY = 3;

        ctx.fillStyle = '#f6fbff';
        ctx.beginPath();
        ctx.moveTo(0, 8);
        ctx.lineTo(10, 2);
        ctx.lineTo(10, 14);
        ctx.closePath();
        ctx.fill();

        ctx.shadowBlur = 0;
        roundedRectPath(8, 4, 22, 10, 5);
        ctx.fill();

        ctx.fillStyle = '#edf6ff';
        ctx.beginPath();
        ctx.moveTo(18, 3);
        ctx.lineTo(24, -1);
        ctx.lineTo(28, 4);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = '#091a33';
        ctx.fillRect(27, 7, 2, 2);
        ctx.fillStyle = 'rgba(216,230,251,.55)';
        ctx.fillRect(24, 6, 2, 1);

        ctx.restore();
      }

      function drawHook(obstacle, time){
        ctx.save();
        ctx.translate(obstacle.x, obstacle.y);
        const sway = Math.sin(time * 0.002 + obstacle.wobble) * 1.4;
        ctx.strokeStyle = 'rgba(240,247,255,.9)';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';

        ctx.beginPath();
        ctx.moveTo(obstacle.w / 2, -18);
        ctx.lineTo(obstacle.w / 2 + sway * 0.2, 4);
        ctx.stroke();

        ctx.beginPath();
        ctx.arc(obstacle.w / 2 + sway * 0.2, 12, obstacle.w / 3.2, Math.PI * 0.1, Math.PI * 1.7);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(obstacle.w / 2 + 5, 22);
        ctx.lineTo(obstacle.w / 2 + 9, 20);
        ctx.stroke();
        ctx.restore();
      }

      function drawNet(obstacle, time){
        ctx.save();
        ctx.translate(obstacle.x, obstacle.y);
        const sway = Math.sin(time * 0.002 + obstacle.wobble) * 1.1;
        ctx.strokeStyle = 'rgba(240,247,255,.92)';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(obstacle.w / 2 + sway * 0.2, -24);
        ctx.lineTo(obstacle.w / 2, 0);
        ctx.stroke();
        ctx.strokeRect(2, 10, obstacle.w - 4, obstacle.h - 12);
        for (let i = 1; i < 3; i++) {
          const xx = 2 + ((obstacle.w - 4) / 3) * i;
          ctx.beginPath();
          ctx.moveTo(xx, 10);
          ctx.lineTo(xx, obstacle.h - 2);
          ctx.stroke();
        }
        for (let i = 1; i < 3; i++) {
          const yy = 10 + ((obstacle.h - 12) / 3) * i;
          ctx.beginPath();
          ctx.moveTo(2, yy);
          ctx.lineTo(obstacle.w - 2, yy);
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawBait(bait, time){
        ctx.save();
        ctx.translate(bait.x, bait.y);
        ctx.rotate(Math.sin(time * 0.004 + bait.phase) * 0.5);
        ctx.fillStyle = 'rgba(216,230,251,.22)';
        ctx.beginPath();
        ctx.arc(0, 0, bait.r + 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.fillRect(-1, -5, 2, 10);
        ctx.fillRect(-5, -1, 10, 2);
        ctx.fillStyle = '#d8e6fb';
        ctx.fillRect(-1, -1, 2, 2);
        ctx.restore();
      }

      function render(time){
        drawBackground(time);

        for (const bait of state.baits) {
          drawBait(bait, time);
        }

        for (const obstacle of state.obstacles) {
          if (obstacle.kind === 'net') {
            drawNet(obstacle, time);
          } else {
            drawHook(obstacle, time);
          }
        }

        drawFish(time);

        if (state.flash > 0) {
          ctx.fillStyle = `rgba(255,255,255,${clamp(state.flash * 5, 0, 0.12)})`;
          ctx.fillRect(0, 0, state.width, state.height);
        }
      }

      function tick(now){
        if (!state.lastTime) {
          state.lastTime = now;
        }
        const dt = Math.min((now - state.lastTime) / 1000, 0.032);
        state.lastTime = now;

        if (state.shake > 0) {
          state.shake = Math.max(0, state.shake - dt * 18);
        }
        if (state.flash > 0) {
          state.flash = Math.max(0, state.flash - dt);
        }

        if (state.running && !state.gameOver) {
          state.speed = Math.min(SPEED_MAX, state.speed + SPEED_RAMP * dt);
          updateFish(dt);
          if (!state.gameOver) {
            updateObstacles(dt);
          }
          if (!state.gameOver) {
            updateScore(dt);
          }
        }

        const shakeX = state.shake > 0 ? (Math.random() - 0.5) * state.shake : 0;
        const shakeY = state.shake > 0 ? (Math.random() - 0.5) * state.shake * 0.6 : 0;
        ctx.save();
        ctx.translate(shakeX, shakeY);
        render(now);
        ctx.restore();

        requestAnimationFrame(tick);
      }

      stage.addEventListener('pointerdown', (event) => {
        event.preventDefault();
        jump();
      });

      window.addEventListener('keydown', (event) => {
        if (event.code === 'Space') {
          event.preventDefault();
          jump();
        }
      });

      window.addEventListener('resize', resize);

      resize();
      state.best = readBest();
      bestEl.textContent = `Best ${formatMeters(state.best)}`;
      setOverlay(false, 'Press Space');
      requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>
