<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nite Owl Angling Supplies</title>
  <meta name="description" content="Nite Owl Angling Supplies placeholder page." />
  <style>
    :root{
      --bg0:#030c1d;
      --bg1:#071b37;
      --bg2:#0c2a52;
      --line:rgba(214,228,252,.2);
      --text:#eff5ff;
      --soft:#cddcf4;
      --muted:#9fb4d5;
      --accent:#7fd3ff;
      --glow:0 24px 70px rgba(0,0,0,.35);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      color:var(--text);
      background:
        radial-gradient(circle at 10% 14%, rgba(255,255,255,.08), transparent 26%),
        radial-gradient(circle at 88% 4%, rgba(127,211,255,.15), transparent 22%),
        linear-gradient(160deg, var(--bg0) 0%, var(--bg1) 42%, var(--bg2) 100%);
      font-family:"Avenir Next","Segoe UI","Helvetica Neue",sans-serif;
      display:grid;
      place-items:center;
      overflow:hidden;
    }

    .grain{
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:.22;
      background-image:
        radial-gradient(circle at 20% 30%, rgba(255,255,255,.06) 0 1px, transparent 1px),
        radial-gradient(circle at 75% 62%, rgba(255,255,255,.05) 0 1px, transparent 1px);
      background-size: 4px 4px, 6px 6px;
      mix-blend-mode:screen;
    }

    .shell{
      width:min(980px, 92vw);
      padding:clamp(28px,5vw,56px);
      text-align:center;
      border:1px solid var(--line);
      border-radius:28px;
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03));
      box-shadow:var(--glow);
      backdrop-filter:blur(8px);
      animation:rise .6s ease-out both;
    }

    h1{
      margin:0;
      font-family:"Archivo Black","Arial Black",sans-serif;
      font-size:clamp(2.5rem,8vw,6.1rem);
      line-height:.94;
      letter-spacing:-.04em;
      text-wrap:balance;
    }

    .line-2{
      margin:20px auto 0;
      max-width:34ch;
      font-size:clamp(1.08rem,2.2vw,1.6rem);
      line-height:1.45;
      color:var(--soft);
      text-wrap:balance;
    }

    .subtext{
      margin:14px 0 0;
      font-size:clamp(.92rem,1.2vw,1.05rem);
      color:var(--muted);
      letter-spacing:.03em;
    }

    .wave{
      position:fixed;
      left:-10%;
      right:-10%;
      bottom:-8vh;
      height:34vh;
      pointer-events:none;
      background:
        radial-gradient(150% 100% at 50% 90%, rgba(127,211,255,.3), transparent 60%),
        repeating-linear-gradient(
          0deg,
          rgba(127,211,255,.18) 0 1px,
          transparent 1px 12px
        );
      mask-image: radial-gradient(120% 90% at 50% 90%, #000 70%, transparent 100%);
      opacity:.5;
      animation:drift 9s linear infinite;
    }

    @keyframes rise{
      from{opacity:0; transform:translateY(16px)}
      to{opacity:1; transform:translateY(0)}
    }

    @keyframes drift{
      from{transform:translateX(0)}
      to{transform:translateX(-36px)}
    }

    @media (max-width: 640px){
      .shell{
        border-radius:20px;
        padding:24px 18px 28px;
      }
      .line-2{
        margin-top:16px;
      }
    }
  </style>
</head>
<body>
  <main class="shell" aria-label="Nite Owl Angling Supplies placeholder">
    <h1>Nite Owl Angling Supplies.</h1>
    <p class="line-2">We hooked something big! The website will soon be live.</p>
    <p class="subtext">We&apos;re building the full site.</p>
  </main>
  <div class="wave" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>
</body>
</html>
